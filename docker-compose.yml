services:
  web:
    build: .
    command: gunicorn core.wsgi:application --config gunicorn.conf.py
    env_file:
      - .env
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis
  worker:
    build: .
    command: celery -A core worker -l info
    env_file:
      - .env
    depends_on:
      - db
      - redis
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-gocart}
      POSTGRES_USER: ${POSTGRES_USER:-gocart}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
volumes:
  postgres_data:
