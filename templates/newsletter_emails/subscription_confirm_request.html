<!DOCTYPE html>
<html>
  <body style="font-family: Arial, sans-serif; color: #111111; line-height: 1.6;">
    <h2>Confirm your subscription</h2>
    <p>Hello,</p>
    <p>You requested to subscribe to <strong>{{ shop_name }}</strong> updates.</p>
    <p>Please confirm by clicking the button below:</p>
    <p>
      <a
        href="{{ confirm_url }}"
        style="display: inline-block; padding: 12px 20px; background: #127D61; color: #ffffff; text-decoration: none; border-radius: 8px;"
      >
        Confirm subscription
      </a>
    </p>
    <p>If you did not request this, you can ignore this email.</p>
    <p>Need help? Contact {{ support_email }}</p>
  </body>
</html>
