<!DOCTYPE html>
<html lang="en">
  <body style="margin:0;padding:0;background-color:#f4f7fb;font-family:Arial,sans-serif;color:#111827;">
    <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background-color:#f4f7fb;margin:0;padding:24px 0;">
      <tr>
        <td align="center">
          <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="max-width:620px;background-color:#ffffff;border-radius:14px;overflow:hidden;">
            
            <!-- Header -->
            <tr>
              <td style="background-color:#1d4ed8;padding:28px 32px;color:#ffffff;">
                <h1 style="margin:0;font-size:24px;line-height:1.3;font-weight:700;">GoCart Support</h1>
                <p style="margin:6px 0 0;font-size:14px;line-height:1.5;opacity:0.95;">New customer enquiry</p>
              </td>
            </tr>

            <!-- Body -->
            <tr>
              <td style="padding:32px;">
                <h2 style="margin:0 0 20px;font-size:21px;line-height:1.4;color:#111827;">New support message received</h2>

                <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="margin-bottom:20px;border-collapse:collapse;">
                  <tr>
                    <td style="padding:10px 0;border-bottom:1px solid #e5e7eb;font-size:14px;color:#6b7280;width:120px;">
                      <strong>Name</strong>
                    </td>
                    <td style="padding:10px 0;border-bottom:1px solid #e5e7eb;font-size:14px;color:#111827;">
                      {{ name }}
                    </td>
                  </tr>
                  <tr>
                    <td style="padding:10px 0;border-bottom:1px solid #e5e7eb;font-size:14px;color:#6b7280;">
                      <strong>Email</strong>
                    </td>
                    <td style="padding:10px 0;border-bottom:1px solid #e5e7eb;font-size:14px;color:#111827;">
                      <a href="mailto:{{ email }}" style="color:#2563eb;text-decoration:none;">{{ email }}</a>
                    </td>
                  </tr>
                </table>

                <p style="margin:0 0 10px;font-size:13px;font-weight:700;letter-spacing:0.3px;text-transform:uppercase;color:#6b7280;">
                  Message
                </p>

                <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background-color:#f9fafb;border:1px solid #e5e7eb;border-radius:10px;">
                  <tr>
                    <td style="padding:18px 20px;">
                      <p style="margin:0;font-size:15px;line-height:1.7;color:#111827;">
                        {{ message }}
                      </p>
                    </td>
                  </tr>
                </table>
              </td>
            </tr>

            <!-- Footer -->
            <tr>
              <td style="padding:20px 32px;background-color:#111827;">
                <p style="margin:0;font-size:13px;line-height:1.6;color:#d1d5db;">
                  {{ shop_name }} • <a href="mailto:{{ support_email }}" style="color:#93c5fd;text-decoration:none;">{{ support_email }}</a>
                </p>
              </td>
            </tr>

          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
